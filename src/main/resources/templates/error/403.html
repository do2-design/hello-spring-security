<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>접근 거부 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .error-box {
      max-width: 700px;
      margin: 100px auto;
      padding: 48px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      text-align: center;
    }
    .error-code {
      font-size: 64px;
      font-weight: 800;
      color: #e94560;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="error-box">
    <div class="error-code">403</div>
    <h3 class="fw-bold mb-3">접근 권한이 없습니다.</h3>
    <p class="text-muted mb-4">
      관리자 권한이 필요한 페이지입니다.
    </p>
    <a th:href="@{/products}" class="btn btn-primary">상품 목록으로 이동</a>
    <a th:href="@{/home}" class="btn btn-outline-secondary">홈으로 이동</a>
  </div>
</div>

<div th:replace="~{fragments/footer :: practiceFooter}"></div>
</body>
</html>
